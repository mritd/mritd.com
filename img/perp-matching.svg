<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2030"/>
      <stop offset="100%" style="stop-color:#353858"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Matching engine: bid/ask meeting -->
  <g transform="translate(400, 135)">
    <!-- Bid orders (left, green) -->
    <rect x="-160" y="-60" width="100" height="22" rx="3" fill="#26a69a" opacity="0.8"/>
    <rect x="-145" y="-33" width="85" height="22" rx="3" fill="#26a69a" opacity="0.6"/>
    <rect x="-130" y="-6" width="70" height="22" rx="3" fill="#26a69a" opacity="0.4"/>
    <text x="-110" y="-44" fill="#e0e0e0" font-family="monospace" font-size="12">BID</text>
    <text x="-95" y="-17" fill="#e0e0e0" font-family="monospace" font-size="12">BID</text>
    <text x="-80" y="10" fill="#e0e0e0" font-family="monospace" font-size="12">BID</text>
    <!-- Ask orders (right, red) -->
    <rect x="60" y="-60" width="100" height="22" rx="3" fill="#ef5350" opacity="0.8"/>
    <rect x="60" y="-33" width="85" height="22" rx="3" fill="#ef5350" opacity="0.6"/>
    <rect x="60" y="-6" width="70" height="22" rx="3" fill="#ef5350" opacity="0.4"/>
    <text x="95" y="-44" fill="#e0e0e0" font-family="monospace" font-size="12">ASK</text>
    <text x="88" y="-17" fill="#e0e0e0" font-family="monospace" font-size="12">ASK</text>
    <text x="80" y="10" fill="#e0e0e0" font-family="monospace" font-size="12">ASK</text>
    <!-- Match spark -->
    <circle cx="0" cy="-25" r="12" fill="#ffd54f" opacity="0.3"/>
    <circle cx="0" cy="-25" r="5" fill="#ffd54f" opacity="0.8"/>
    <!-- Arrows pointing to center -->
    <line x1="-50" y1="-25" x2="-18" y2="-25" stroke="#ffd54f" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="-25" x2="18" y2="-25" stroke="#ffd54f" stroke-width="2" opacity="0.6"/>
  </g>

  <text x="400" y="310" text-anchor="middle" fill="#e8eaed" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700">Matching Engine</text>
  <text x="400" y="350" text-anchor="middle" fill="#ffd54f" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400">Principles &amp; Go Implementation</text>
  <rect x="340" y="370" width="120" height="3" rx="1.5" fill="#ffd54f"/>
</svg>