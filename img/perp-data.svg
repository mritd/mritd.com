<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2030"/>
      <stop offset="100%" style="stop-color:#2a3550"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Data pipeline / API flow -->
  <g transform="translate(400, 140)">
    <!-- Source blocks -->
    <rect x="-150" y="-50" width="70" height="35" rx="4" fill="none" stroke="#90caf9" stroke-width="2"/>
    <text x="-115" y="-27" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="11">ETH</text>
    <rect x="-150" y="5" width="70" height="35" rx="4" fill="none" stroke="#90caf9" stroke-width="2"/>
    <text x="-115" y="28" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="11">gRPC</text>
    <rect x="-150" y="60" width="70" height="35" rx="4" fill="none" stroke="#90caf9" stroke-width="2"/>
    <text x="-115" y="83" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="11">REST</text>
    <!-- Arrows -->
    <line x1="-75" y1="-32" x2="-25" y2="15" stroke="#90caf9" stroke-width="1.5" opacity="0.5"/>
    <line x1="-75" y1="22" x2="-25" y2="22" stroke="#90caf9" stroke-width="1.5" opacity="0.5"/>
    <line x1="-75" y1="77" x2="-25" y2="30" stroke="#90caf9" stroke-width="1.5" opacity="0.5"/>
    <!-- Central processor -->
    <rect x="-25" y="-5" width="80" height="55" rx="6" fill="#90caf9" fill-opacity="0.15" stroke="#90caf9" stroke-width="2"/>
    <text x="15" y="18" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="10">PARSE</text>
    <text x="15" y="32" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="10">DECODE</text>
    <!-- Output -->
    <line x1="60" y1="22" x2="100" y2="22" stroke="#90caf9" stroke-width="1.5" opacity="0.5"/>
    <rect x="100" y="-5" width="70" height="55" rx="4" fill="none" stroke="#90caf9" stroke-width="2"/>
    <text x="135" y="18" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="10">FUND</text>
    <text x="135" y="32" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="10">RATE</text>
    <text x="135" y="46" text-anchor="middle" fill="#90caf9" font-family="monospace" font-size="10">OI</text>
  </g>

  <text x="400" y="310" text-anchor="middle" fill="#e8eaed" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700">Data Parsing</text>
  <text x="400" y="350" text-anchor="middle" fill="#90caf9" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400">On-Chain Data Engineering</text>
  <rect x="340" y="370" width="120" height="3" rx="1.5" fill="#90caf9"/>
</svg>