<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a1a"/>
      <stop offset="100%" style="stop-color:#4a2a2a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Transaction ordering / frontrun visualization -->
  <g transform="translate(400, 140)">
    <!-- Block slots -->
    <rect x="-120" y="-40" width="80" height="30" rx="4" fill="none" stroke="#ffab91" stroke-width="2" opacity="0.5"/>
    <rect x="-30" y="-40" width="80" height="30" rx="4" fill="#ffab91" fill-opacity="0.3" stroke="#ffab91" stroke-width="2"/>
    <rect x="60" y="-40" width="80" height="30" rx="4" fill="none" stroke="#ffab91" stroke-width="2" opacity="0.5"/>
    <!-- Sandwich arrows -->
    <path d="M-20,-55 L15,-55 L15,-48" fill="none" stroke="#ff8a65" stroke-width="2.5" marker-end="none"/>
    <path d="M-20,0 L15,0 L15,-7" fill="none" stroke="#ff8a65" stroke-width="2.5"/>
    <!-- Victim tx -->
    <rect x="-15" y="-35" width="50" height="20" rx="3" fill="#ef5350" opacity="0.4"/>
    <!-- Attacker arrows -->
    <text x="15" y="-58" text-anchor="middle" fill="#ff8a65" font-family="monospace" font-size="11">FRONT</text>
    <text x="15" y="14" text-anchor="middle" fill="#ff8a65" font-family="monospace" font-size="11">BACK</text>
    <!-- Block chain dots -->
    <circle cx="-140" cy="-25" r="4" fill="#ffab91" opacity="0.4"/>
    <circle cx="160" cy="-25" r="4" fill="#ffab91" opacity="0.4"/>
    <line x1="-136" y1="-25" x2="-122" y2="-25" stroke="#ffab91" stroke-width="1" opacity="0.3"/>
    <line x1="142" y1="-25" x2="156" y2="-25" stroke="#ffab91" stroke-width="1" opacity="0.3"/>
  </g>

  <text x="400" y="310" text-anchor="middle" fill="#e8eaed" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700">Perps MEV</text>
  <text x="400" y="350" text-anchor="middle" fill="#ffab91" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400">Extraction &amp; Prevention</text>
  <rect x="340" y="370" width="120" height="3" rx="1.5" fill="#ffab91"/>
</svg>